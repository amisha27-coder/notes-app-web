<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Saver App</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

textarea{
width:100%;
height:80px;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#f1f1f1;
padding:10px;
margin-bottom:10px;
border-radius:5px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:4px;
}

</style>

</head>

<body>

<div class="container">

<h1>Notes Saver</h1>

<textarea id="noteInput" placeholder="Write your note..."></textarea>

<button onclick="addNote()">Add Note</button>

<ul id="notesList"></ul>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

function displayNotes(){

let list = document.getElementById("notesList");
list.innerHTML = "";

notes.forEach((note,index)=>{

let li = document.createElement("li");

li.innerHTML = `
${note}
<button class="delete" onclick="deleteNote(${index})">Delete</button>
`;

list.appendChild(li);

});

}

function addNote(){

let input = document.getElementById("noteInput");

if(input.value.trim() === "") return;

notes.push(input.value);

localStorage.setItem("notes",JSON.stringify(notes));

input.value="";

displayNotes();

}

function deleteNote(index){

notes.splice(index,1);

localStorage.setItem("notes",JSON.stringify(notes));

displayNotes();

}

displayNotes();

</script>

</body>
</html>
